<html>
  <head>
    <title>Pruebas</title>
  </head>
  <body>
    <div>
      <h1>Sitio test</h1>
    </div>
    <p>Ambiente de desarrollo....</p>

    <script type="text/javascript">
      function initEmbeddedMessaging() {
        try {
          embeddedservice_bootstrap.settings.language = "es_MX";

          embeddedservice_bootstrap.init(
            "00DDG00000N95FE",
            "Chatbot_web",
            "https://gocar--developer.sandbox.my.site.com/ESWChatbotweb1745223554757",
            {
              scrt2URL: "https://gocar--developer.sandbox.my.salesforce-scrt.com"
            }
          );

          var maxIntentos = 20;
          var intentos = 0;
          var intervalo = setInterval(function () {
            intentos++;
          
            if (typeof embeddedservice_bootstrap.prechatAPI === "object" && embeddedservice_bootstrap.prechatAPI !== null) {
              clearInterval(intervalo);
              var currentURL = window.location.href;
          
              try {
                embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
                  //"GOC_URL": currentURL //Valor dinámico
                  "GOC_URL": "https://pruebas.seminuevosgocar.mx" //Valor de prueba
                });
                console.log("✅ setHiddenPrechatFields ejecutado sin errores");
                console.log("✅ Valor enviado:", currentURL);
              } catch(e) {
                console.error("❌ Error en setHiddenPrechatFields:", e);
              }
          
            } else if (intentos >= maxIntentos) {
              clearInterval(intervalo);
              console.error("prechatAPI no disponible después de " + maxIntentos + " intentos.");
            }
          }, 500);

        } catch (err) {
          console.error("Error loading Embedded Messaging: ", err);
        }
      }
    </script>

    <script
      type="text/javascript"
      src="https://gocar--developer.sandbox.my.site.com/ESWChatbotweb1745223554757/assets/js/bootstrap.min.js"
      onload="initEmbeddedMessaging()"
    ></script>
  </body>
</html>
